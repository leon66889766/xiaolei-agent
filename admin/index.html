<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>管理后台 - 小雷没摸鱼agent</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh; color: #e2e8f0;
}
.login-container {
  display: flex; justify-content: center; align-items: center; min-height: 100vh;
}
.login-card {
  background: rgba(255,255,255,0.05); backdrop-filter: blur(20px);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 24px;
  padding: 48px 40px; width: 100%; max-width: 420px;
  box-shadow: 0 25px 60px rgba(0,0,0,0.3);
}
.login-card h1 {
  font-size: 28px; text-align: center; margin-bottom: 8px;
  background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.login-card .subtitle { text-align: center; color: rgba(255,255,255,0.5); margin-bottom: 32px; font-size: 14px; }
.form-group { margin-bottom: 20px; }
.form-group label { display: block; margin-bottom: 6px; font-size: 13px; color: rgba(255,255,255,0.7); }
.form-group input {
  width: 100%; padding: 12px 16px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.06); color: #fff; font-size: 14px; outline: none; transition: all 0.3s;
}
.form-group input:focus { border-color: rgba(99,102,241,0.5); box-shadow: 0 0 20px rgba(99,102,241,0.1); }
.btn-primary {
  width: 100%; padding: 12px; border-radius: 12px; border: none; font-size: 15px; font-weight: 600; cursor: pointer;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  transition: all 0.3s;
}
.btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 25px rgba(99,102,241,0.35); }
.btn-primary:disabled { opacity: 0.5; cursor: not-allowed; }
.error-msg { color: #f87171; font-size: 13px; text-align: center; margin-top: 12px; }

.admin-container { display: none; min-height: 100vh; }
.admin-header {
  padding: 16px 32px; background: rgba(255,255,255,0.04);
  border-bottom: 1px solid rgba(255,255,255,0.08);
  display: flex; align-items: center; justify-content: space-between;
}
.admin-header h1 {
  font-size: 20px;
  background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.admin-header .header-right { display: flex; align-items: center; gap: 16px; }
.admin-header .username { font-size: 14px; color: rgba(255,255,255,0.7); }
.btn-logout {
  padding: 6px 16px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.2);
  background: transparent; color: rgba(255,255,255,0.7); cursor: pointer; font-size: 13px; transition: all 0.3s;
}
.btn-logout:hover { background: rgba(255,255,255,0.1); }

.admin-main { padding: 24px 32px; max-width: 1400px; margin: 0 auto; }
.stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 20px;
}
.stat-card .stat-label { font-size: 12px; color: rgba(255,255,255,0.5); margin-bottom: 6px; }
.stat-card .stat-value { font-size: 28px; font-weight: 700; color: #c4b5fd; }

.panels { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 24px; }
.panel {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 24px;
}
.panel h3 { font-size: 16px; margin-bottom: 16px; color: #c4b5fd; }
.panel label { display: block; margin-bottom: 4px; font-size: 13px; color: rgba(255,255,255,0.6); }
.panel input, .panel textarea {
  width: 100%; padding: 10px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; outline: none; margin-bottom: 12px; resize: vertical;
  font-family: inherit;
}
.panel input:focus, .panel textarea:focus { border-color: rgba(99,102,241,0.5); }
.panel textarea { min-height: 60px; }
.btn-sm {
  padding: 8px 20px; border-radius: 10px; border: none; font-size: 13px; cursor: pointer;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  transition: all 0.3s;
}
.btn-sm:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
.btn-sm.btn-danger { background: linear-gradient(135deg, #ef4444, #dc2626); }
.upload-zone {
  border: 2px dashed rgba(255,255,255,0.2); border-radius: 16px;
  padding: 40px 20px; text-align: center; cursor: pointer;
  transition: all 0.3s; margin-bottom: 12px;
}
.upload-zone:hover, .upload-zone.drag-over {
  border-color: rgba(99,102,241,0.6); background: rgba(99,102,241,0.08);
}
.upload-zone p { color: rgba(255,255,255,0.5); font-size: 14px; }
.upload-zone .upload-icon { font-size: 40px; margin-bottom: 8px; }
.upload-result { margin-top: 8px; font-size: 12px; color: rgba(255,255,255,0.5); }

.resource-table-section {
  background: rgba(255,255,255,0.04); border: 1px solid rgba(255,255,255,0.08);
  border-radius: 16px; padding: 24px;
}
.resource-table-section h3 { font-size: 16px; margin-bottom: 16px; color: #c4b5fd; }
.toolbar { display: flex; gap: 12px; margin-bottom: 16px; }
.toolbar input {
  flex: 1; padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; outline: none;
}
.toolbar select {
  padding: 8px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,0.12);
  background: rgba(255,255,255,0.05); color: #fff; font-size: 13px; outline: none;
}
.toolbar select option { background: #1e1b4b; color: #fff; }
.table-wrapper { overflow-x: auto; }
table { width: 100%; border-collapse: collapse; font-size: 13px; }
table th {
  text-align: left; padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.1);
  color: rgba(255,255,255,0.6); font-weight: 600; white-space: nowrap;
}
table td {
  padding: 10px 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
  color: rgba(255,255,255,0.85);
}
table tr:hover { background: rgba(255,255,255,0.03); }
.type-badge {
  display: inline-block; padding: 2px 8px; border-radius: 6px; font-size: 11px;
}
.type-badge.image { background: rgba(34,197,94,0.2); color: #4ade80; }
.type-badge.video { background: rgba(59,130,246,0.2); color: #60a5fa; }
.type-badge.audio { background: rgba(245,158,11,0.2); color: #fbbf24; }
.type-badge.document { background: rgba(139,92,246,0.2); color: #a78bfa; }
.type-badge.link { background: rgba(20,184,166,0.2); color: #2dd4bf; }
.type-badge.archive { background: rgba(244,114,182,0.2); color: #f472b6; }
.type-badge.3d { background: rgba(250,204,21,0.2); color: #facc15; }
.type-badge.code { background: rgba(168,85,247,0.2); color: #c084fc; }
.type-badge.other { background: rgba(156,163,175,0.2); color: #9ca3af; }
.btn-del {
  padding: 4px 12px; border-radius: 6px; border: none; font-size: 12px; cursor: pointer;
  background: rgba(239,68,68,0.2); color: #f87171; transition: all 0.3s;
}
.btn-del:hover { background: rgba(239,68,68,0.4); }
.empty-state { text-align: center; padding: 40px; color: rgba(255,255,255,0.4); }

@media (max-width: 768px) {
  .stats-row { grid-template-columns: repeat(2, 1fr); }
  .panels { grid-template-columns: 1fr; }
  .admin-main { padding: 16px; }
  .admin-header { padding: 12px 16px; }
}
</style>
</head>
<body>

<div class="login-container" id="loginPage">
  <div class="login-card">
    <h1>小雷没摸鱼agent</h1>
    <p class="subtitle">管理后台 - 资源管理</p>
    <div class="form-group">
      <label>管理员账号</label>
      <input type="text" id="loginUsername" placeholder="请输入管理员账号" value="admin">
    </div>
    <div class="form-group">
      <label>管理员密码</label>
      <input type="password" id="loginPassword" placeholder="请输入密码" value="admin123">
    </div>
    <button class="btn-primary" id="loginBtn" onclick="doLogin()">登录</button>
    <p class="error-msg" id="loginError"></p>
  </div>
</div>

<div class="admin-container" id="adminPage">
  <div class="admin-header">
    <h1>小雷没摸鱼agent - 管理后台</h1>
    <div class="header-right">
      <span class="username" id="currentUser"></span>
      <button class="btn-logout" onclick="doLogout()">退出登录</button>
    </div>
  </div>
  <div class="admin-main">
    <div class="stats-row" id="statsRow">
      <div class="stat-card"><div class="stat-label">资源总数</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div class="stat-label">上传文件</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div class="stat-label">外部链接</div><div class="stat-value">0</div></div>
      <div class="stat-card"><div class="stat-label">总大小</div><div class="stat-value">-</div></div>
    </div>

    <div class="panels">
      <!-- 上传文件面板 -->
      <div class="panel">
        <h3>上传文件</h3>
        <label>资源名称（可选，多文件时使用文件名）</label>
        <input type="text" id="uploadTitle" placeholder="给资源起个名字，方便搜索">
        <label>标签（可选，逗号分隔，便于检索）</label>
        <input type="text" id="uploadTags" placeholder="例如：logo, 品牌, VI设计">
        <label>描述（可选）</label>
        <textarea id="uploadDesc" placeholder="简要描述资源内容，帮助AI更好匹配" style="min-height:48px"></textarea>
        <div class="upload-zone" id="uploadZone" onclick="document.getElementById('fileInput').click()">
          <div class="upload-icon">&#x1F4E4;</div>
          <p>拖拽文件到此处，或点击选择文件</p>
          <p style="font-size:11px;margin-top:4px;color:rgba(255,255,255,0.3)">支持图片/视频/音频/文档/3D设计/代码/压缩包/字体等 140+ 格式</p>
        </div>
        <input type="file" id="fileInput" multiple hidden accept=".jpg,.jpeg,.png,.gif,.bmp,.webp,.svg,.ico,.tiff,.tif,.raw,.cr2,.nef,.dng,.arw,.heic,.heif,.psd,.ai,.eps,.cdr,.indd,.xcf,.psb,.jp2,.jxr,.mp4,.avi,.mov,.mkv,.webm,.flv,.wmv,.mts,.m2ts,.ts,.vob,.3gp,.ogv,.rmvb,.rm,.asf,.mpeg,.mpg,.mod,.tod,.f4v,.m4v,.divx,.xvid,.mp3,.wav,.flac,.ogg,.wma,.aac,.m4a,.aiff,.alac,.ape,.mid,.midi,.amr,.opus,.mka,.ac3,.dts,.wv,.ra,.caf,.pdf,.doc,.docx,.xls,.xlsx,.ppt,.pptx,.txt,.csv,.md,.rtf,.odt,.ods,.odp,.epub,.mobi,.djvu,.tex,.xml,.html,.htm,.zip,.rar,.7z,.tar,.gz,.bz2,.xz,.iso,.cab,.arj,.tgz,.tbz2,.txz,.c4d,.blend,.fbx,.obj,.stl,.3ds,.max,.mb,.ma,.glb,.gltf,.dae,.usd,.usdz,.step,.stp,.iges,.igs,.ply,.abc,.skp,.3mf,.js,.ts,.jsx,.tsx,.py,.java,.c,.cpp,.h,.hpp,.go,.rs,.swift,.kt,.php,.rb,.sql,.sh,.bat,.ps1,.yml,.yaml,.toml,.ini,.cfg,.conf,.env,.css,.scss,.less,.vue,.svelte,.ttf,.otf,.woff,.woff2,.eot,.exe,.msi,.apk,.dmg,.deb,.rpm,.db,.sqlite,.sqlite3">
        <div class="upload-result" id="uploadResult"></div>
      </div>

      <!-- 添加链接面板 -->
      <div class="panel">
        <h3>添加链接</h3>
        <label>链接标题</label>
        <input type="text" id="linkTitle" placeholder="资源标题">
        <label>链接地址</label>
        <input type="text" id="linkUrl" placeholder="https://...">
        <label>描述（可选）</label>
        <textarea id="linkDesc" placeholder="资源描述"></textarea>
        <label>标签（可选，逗号分隔）</label>
        <input type="text" id="linkTags" placeholder="标签1, 标签2">
        <button class="btn-sm" onclick="doAddLink()">添加链接</button>
        <div id="linkResult" style="margin-top:8px;font-size:12px;"></div>
      </div>
    </div>

    <!-- 资源列表 -->
    <div class="resource-table-section">
      <h3>资源列表 (<span id="resourceCount">0</span>)</h3>
      <div class="toolbar">
        <input type="text" id="searchInput" placeholder="搜索资源..." oninput="doLoadResources()">
        <select id="filterType" onchange="doLoadResources()">
          <option value="">全部类型</option>
          <option value="image">图片</option>
          <option value="video">视频</option>
          <option value="audio">音频</option>
          <option value="document">文档</option>
          <option value="3d">3D设计</option>
          <option value="archive">压缩包</option>
          <option value="code">代码</option>
          <option value="link">链接</option>
        </select>
        <button class="btn-sm" onclick="doLoadResources()">刷新</button>
      </div>
      <div class="table-wrapper">
        <table>
          <thead>
            <tr>
              <th>类型</th><th>标题</th><th>文件名/链接</th><th>大小</th><th>标签</th><th>上传时间</th><th>操作</th>
            </tr>
          </thead>
          <tbody id="resourceTableBody">
            <tr><td colspan="7" class="empty-state">加载中...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<script>
var API_BASE = 'https://plants-sam-campaigns-nominations.trycloudflare.com';
var token = localStorage.getItem('xiaolei_token') || '';

(function init() {
  if (token) {
    verifyToken().then(function(ok) {
      if (ok) showAdmin();
      else { localStorage.removeItem('xiaolei_token'); token = ''; }
    });
  }
})();

function verifyToken() {
  return fetch(API_BASE + '/api/admin/verify', {
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) { document.getElementById('currentUser').textContent = d.username; return true; }
    return false;
  }).catch(function() { return false; });
}

function doLogin() {
  var btn = document.getElementById('loginBtn');
  var username = document.getElementById('loginUsername').value.trim();
  var password = document.getElementById('loginPassword').value.trim();
  var errEl = document.getElementById('loginError');
  if (!username || !password) { errEl.textContent = '请输入账号和密码'; return; }
  btn.disabled = true; btn.textContent = '登录中...';
  fetch(API_BASE + '/api/admin/login', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ username: username, password: password })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      token = d.token;
      localStorage.setItem('xiaolei_token', token);
      document.getElementById('currentUser').textContent = d.username;
      showAdmin();
    } else {
      errEl.textContent = d.error || '登录失败';
    }
  }).catch(function(e) {
    errEl.textContent = '连接服务器失败: ' + e.message;
  }).finally(function() {
    btn.disabled = false; btn.textContent = '登录';
  });
}

function doLogout() {
  localStorage.removeItem('xiaolei_token');
  token = '';
  document.getElementById('loginPage').style.display = 'flex';
  document.getElementById('adminPage').style.display = 'none';
}

function showAdmin() {
  document.getElementById('loginPage').style.display = 'none';
  document.getElementById('adminPage').style.display = 'block';
  doLoadStats();
  doLoadResources();
  setupDragDrop();
}

function setupDragDrop() {
  var zone = document.getElementById('uploadZone');
  var fileInput = document.getElementById('fileInput');
  fileInput.addEventListener('change', function() { doUploadFiles(fileInput.files); });
  zone.addEventListener('dragover', function(e) { e.preventDefault(); zone.classList.add('drag-over'); });
  zone.addEventListener('dragleave', function() { zone.classList.remove('drag-over'); });
  zone.addEventListener('drop', function(e) {
    e.preventDefault(); zone.classList.remove('drag-over');
    doUploadFiles(e.dataTransfer.files);
  });
}

function doUploadFiles(files) {
  if (!files || !files.length) return;
  var resultEl = document.getElementById('uploadResult');
  resultEl.textContent = '上传中...';
  resultEl.style.color = 'rgba(255,255,255,0.5)';
  var formData = new FormData();
  for (var i = 0; i < files.length; i++) formData.append('files', files[i]);
  var uploadTitle = document.getElementById('uploadTitle').value.trim();
  var uploadTags = document.getElementById('uploadTags').value.trim();
  var uploadDesc = document.getElementById('uploadDesc').value.trim();
  if (uploadTitle) formData.append('title', uploadTitle);
  if (uploadTags) formData.append('tags', uploadTags);
  if (uploadDesc) formData.append('description', uploadDesc);

  fetch(API_BASE + '/api/upload', {
    method: 'POST',
    headers: { 'Authorization': 'Bearer ' + token },
    body: formData
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      var success = 0, failed = 0;
      d.data.forEach(function(item) { if (item.success) success++; else failed++; });
      resultEl.innerHTML = '&#x2705; 成功上传 ' + success + ' 个文件' + (failed ? '，' + failed + ' 个失败' : '');
      resultEl.style.color = '#4ade80';
      document.getElementById('uploadTitle').value = '';
      document.getElementById('uploadTags').value = '';
      document.getElementById('uploadDesc').value = '';
      document.getElementById('fileInput').value = '';
      doLoadStats();
      doLoadResources();
    } else {
      resultEl.textContent = '上传失败: ' + (d.error || '未知错误');
      resultEl.style.color = '#f87171';
    }
  }).catch(function(e) {
    resultEl.textContent = '上传失败: ' + e.message;
    resultEl.style.color = '#f87171';
  });
}

function doAddLink() {
  var title = document.getElementById('linkTitle').value.trim();
  var url = document.getElementById('linkUrl').value.trim();
  var description = document.getElementById('linkDesc').value.trim();
  var tags = document.getElementById('linkTags').value.trim();
  var resultEl = document.getElementById('linkResult');
  if (!title || !url) { resultEl.textContent = '标题和链接不能为空'; resultEl.style.color = '#f87171'; return; }
  fetch(API_BASE + '/api/resources', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
    body: JSON.stringify({ title: title, url: url, description: description, tags: tags })
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      resultEl.textContent = '链接添加成功';
      resultEl.style.color = '#4ade80';
      document.getElementById('linkTitle').value = '';
      document.getElementById('linkUrl').value = '';
      document.getElementById('linkDesc').value = '';
      document.getElementById('linkTags').value = '';
      doLoadStats();
      doLoadResources();
    } else {
      resultEl.textContent = d.error || '添加失败';
      resultEl.style.color = '#f87171';
    }
  }).catch(function(e) {
    resultEl.textContent = '添加失败: ' + e.message;
    resultEl.style.color = '#f87171';
  });
}

function doLoadStats() {
  fetch(API_BASE + '/api/stats', { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) {
      var s = d.data;
      document.getElementById('statsRow').innerHTML =
        '<div class="stat-card"><div class="stat-label">资源总数</div><div class="stat-value">' + s.total + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">上传文件</div><div class="stat-value">' + s.files + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">外部链接</div><div class="stat-value">' + s.links + '</div></div>' +
        '<div class="stat-card"><div class="stat-label">总大小</div><div class="stat-value">' + formatSize(s.total_size) + '</div></div>';
    }
  }).catch(function() {});
}

function typeLabel(t) {
  var map = { image:'图片', video:'视频', audio:'音频', document:'文档', archive:'压缩包', link:'链接', '3d':'3D设计', code:'代码' };
  return map[t] || t || '其他';
}

function doLoadResources() {
  var q = document.getElementById('searchInput').value;
  var t = document.getElementById('filterType').value;
  var url = API_BASE + '/api/resources?';
  if (q) url += 'q=' + encodeURIComponent(q) + '&';
  if (t) url += 'type=' + encodeURIComponent(t) + '&';
  fetch(url, { headers: { 'Authorization': 'Bearer ' + token } })
    .then(function(r) { return r.json(); }).then(function(d) {
    document.getElementById('resourceCount').textContent = d.total || 0;
    if (d.success && d.data && d.data.length > 0) {
      document.getElementById('resourceTableBody').innerHTML = d.data.map(function(r) {
        return '<tr>' +
          '<td><span class="type-badge ' + (r.file_type || 'other') + '">' + typeLabel(r.file_type) + '</span></td>' +
          '<td>' + escapeHtml(r.title) + '</td>' +
          '<td style="max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' + escapeHtml(r.original_name || r.url || r.filename || '') + '</td>' +
          '<td>' + formatSize(r.file_size) + '</td>' +
          '<td>' + escapeHtml(r.tags || '-') + '</td>' +
          '<td>' + (r.created_at || '-') + '</td>' +
          '<td><button class="btn-del" onclick="doDeleteResource(\'' + r.id + '\')">删除</button></td>' +
        '</tr>';
      }).join('');
    } else {
      document.getElementById('resourceTableBody').innerHTML = '<tr><td colspan="7" class="empty-state">暂无资源</td></tr>';
    }
  }).catch(function() {
    document.getElementById('resourceTableBody').innerHTML = '<tr><td colspan="7" class="empty-state">加载失败</td></tr>';
  });
}

function doDeleteResource(id) {
  if (!confirm('确定删除该资源吗？')) return;
  fetch(API_BASE + '/api/resources/' + id, {
    method: 'DELETE',
    headers: { 'Authorization': 'Bearer ' + token }
  }).then(function(r) { return r.json(); }).then(function(d) {
    if (d.success) { doLoadStats(); doLoadResources(); }
    else alert(d.error || '删除失败');
  }).catch(function(e) { alert('删除失败: ' + e.message); });
}

function formatSize(bytes) {
  if (!bytes || bytes === 0) return '-';
  var units = ['B','KB','MB','GB'];
  var s = bytes, i = 0;
  while (s >= 1024 && i < 3) { s /= 1024; i++; }
  return s.toFixed(2) + ' ' + units[i];
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}
</script>
