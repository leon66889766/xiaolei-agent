<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>е°Ҹйӣ·жІЎж‘ёйұјagent - AIиө„жәҗеҠ©жүӢ</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  min-height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
}
.app-container {
  width: 100%;
  max-width: 900px;
  height: 100vh;
  display: flex;
  flex-direction: column;
  background: rgba(255,255,255,0.03);
  backdrop-filter: blur(20px);
  border-left: 1px solid rgba(255,255,255,0.1);
  border-right: 1px solid rgba(255,255,255,0.1);
}
.header {
  padding: 16px 24px;
  background: linear-gradient(90deg, rgba(99,102,241,0.3), rgba(168,85,247,0.3));
  border-bottom: 1px solid rgba(255,255,255,0.1);
  display: flex;
  align-items: center;
  gap: 12px;
}
.header-icon {
  width: 40px; height: 40px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6);
  border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: 20px; color: #fff;
}
.header h1 {
  font-size: 20px;
  font-weight: 700;
  background: linear-gradient(90deg, #a5b4fc, #c4b5fd);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.header-subtitle {
  font-size: 12px; color: rgba(255,255,255,0.5); margin-left: auto;
}

.chat-area {
  flex: 1; overflow-y: auto; padding: 20px 24px;
  display: flex; flex-direction: column; gap: 16px;
}
.chat-area::-webkit-scrollbar { width: 6px; }
.chat-area::-webkit-scrollbar-track { background: transparent; }
.chat-area::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 3px; }

.welcome-msg {
  text-align: center; padding: 60px 20px; color: rgba(255,255,255,0.5);
}
.welcome-msg .welcome-icon {
  font-size: 64px; margin-bottom: 16px;
  background: linear-gradient(135deg, #6366f1, #a855f7);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.welcome-msg h2 { font-size: 24px; color: rgba(255,255,255,0.8); margin-bottom: 8px; }
.welcome-msg p { font-size: 14px; line-height: 1.8; }
.welcome-msg .suggestions { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
.suggestion-chip {
  padding: 8px 16px; border-radius: 20px; background: rgba(99,102,241,0.2);
  border: 1px solid rgba(99,102,241,0.3); color: #a5b4fc;
  font-size: 13px; cursor: pointer; transition: all 0.3s;
}
.suggestion-chip:hover { background: rgba(99,102,241,0.4); transform: translateY(-1px); }

.message { display: flex; gap: 12px; animation: fadeIn 0.3s ease; }
.message.user { flex-direction: row-reverse; }
.msg-avatar {
  width: 36px; height: 36px; border-radius: 10px; flex-shrink: 0;
  display: flex; align-items: center; justify-content: center; font-size: 16px; color: #fff;
}
.message.user .msg-avatar { background: linear-gradient(135deg, #6366f1, #8b5cf6); }
.message.assistant .msg-avatar { background: linear-gradient(135deg, #a855f7, #6366f1); }
.msg-content {
  max-width: 75%; padding: 12px 16px; border-radius: 16px; font-size: 14px; line-height: 1.6;
}
.message.user .msg-content {
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .msg-content {
  background: rgba(255,255,255,0.08); color: rgba(255,255,255,0.9);
  border-bottom-left-radius: 4px; border: 1px solid rgba(255,255,255,0.06);
}

.resource-card {
  margin-top: 8px; padding: 12px;
  background: rgba(0,0,0,0.2); border-radius: 12px;
  border: 1px solid rgba(255,255,255,0.08);
}
.resource-card .rc-title { font-weight: 600; margin-bottom: 4px; color: #c4b5fd; }
.resource-card .rc-desc { font-size: 12px; color: rgba(255,255,255,0.6); margin-bottom: 8px; }
.resource-card .rc-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 8px; }
.resource-card .rc-tag {
  padding: 2px 8px; border-radius: 10px; font-size: 11px;
  background: rgba(139,92,246,0.3); color: #c4b5fd;
}
.resource-card .rc-link {
  display: inline-block; padding: 6px 14px; border-radius: 8px;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  text-decoration: none; font-size: 13px; transition: all 0.3s;
}
.resource-card .rc-link:hover { transform: translateY(-1px); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
.resource-card img, .resource-card video {
  max-width: 100%; border-radius: 8px; margin: 8px 0; max-height: 300px;
}
.resource-card audio { width: 100%; margin: 8px 0; }

.resource-card .rc-meta { font-size: 11px; color: rgba(255,255,255,0.4); }

.loading-dots {
  display: flex; gap: 4px; padding: 8px 0;
}
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.4);
  animation: bounce 1.4s infinite ease-in-out;
}
.loading-dots span:nth-child(2) { animation-delay: 0.2s; }
.loading-dots span:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

.input-area {
  padding: 16px 24px; border-top: 1px solid rgba(255,255,255,0.1);
  display: flex; gap: 12px; align-items: center;
}
.input-wrapper {
  flex: 1; display: flex; align-items: center;
  background: rgba(255,255,255,0.06); border-radius: 16px;
  border: 1px solid rgba(255,255,255,0.1);
  padding: 4px 4px 4px 16px; transition: all 0.3s;
}
.input-wrapper:focus-within {
  border-color: rgba(99,102,241,0.5);
  box-shadow: 0 0 20px rgba(99,102,241,0.15);
}
.input-wrapper input {
  flex: 1; background: none; border: none; outline: none;
  color: #fff; font-size: 14px; padding: 8px 0;
}
.input-wrapper input::placeholder { color: rgba(255,255,255,0.3); }
.send-btn {
  width: 40px; height: 40px; border-radius: 12px; border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  cursor: pointer; font-size: 16px; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(99,102,241,0.4); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

@media (max-width: 640px) {
  .app-container { height: 100dvh; border: none; }
  .header { padding: 12px 16px; }
  .header h1 { font-size: 16px; }
  .chat-area { padding: 16px; }
  .input-area { padding: 12px 16px; }
  .msg-content { max-width: 85%; }
}
</style>
</head>
<body>
<div class="app-container">
  <div class="header">
    <div class="header-icon">вҡ?/div>
    <h1>е°Ҹйӣ·жІЎж‘ёйұјagent</h1>
    <span class="header-subtitle">AIиө„жәҗеҠ©жүӢ</span>
  </div>
  <div class="chat-area" id="chatArea">
    <div class="welcome-msg" id="welcomeMsg">
      <div class="welcome-icon">рҹӨ–</div>
      <h2>дҪ еҘҪпјҢжҲ‘жҳҜе°Ҹйӣ·жІЎж‘ёйұјagent</h2>
      <p>дҪ еҸҜд»Ҙеҗ‘жҲ‘жҸҗй—®пјҢжҲ‘дјҡд»Һиө„жәҗзҹҘиҜҶеә“дёӯдёәдҪ еҢ№й…ҚжңҖзӣёе…ізҡ„иө„ж–ҷгҖ?br>ж”ҜжҢҒжҹҘжүҫж–ҮжЎЈгҖҒи§Ҷйў‘гҖҒеӣҫзүҮгҖҒйҹійў‘зӯүеҗ„з§Қиө„жәҗгҖ?/p>
      <div class="suggestions">
        <span class="suggestion-chip" onclick="sendSuggestion('жңүе“ӘдәӣеӯҰд№ иө„ж–?)">еӯҰд№ иө„ж–ҷ</span>
        <span class="suggestion-chip" onclick="sendSuggestion('её®жҲ‘жүҫи§Ҷйў‘ж•ҷзЁ?)">и§Ҷйў‘ж•ҷзЁӢ</span>
        <span class="suggestion-chip" onclick="sendSuggestion('жңүжІЎжңүPPTжЁЎжқҝ')">PPTжЁЎжқҝ</span>
        <span class="suggestion-chip" onclick="sendSuggestion('жҹҘжүҫж–ҮжЎЈиө„ж–ҷ')">ж–ҮжЎЈиө„ж–ҷ</span>
      </div>
    </div>
  </div>
  <div class="input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="иҫ“е…ҘдҪ зҡ„й—®йўҳпјҢжҲ‘дјҡд»Һиө„жәҗеә“дёӯдёәдҪ жҹҘжүҫ..." onkeydown="if(event.key==='Enter') sendMessage()">
    </div>
    <button class="send-btn" id="sendBtn" onclick="sendMessage()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<script>
const API_BASE = 'https://view-vary-thick-transit.trycloudflare.com';
let isLoading = false;

function sendSuggestion(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

async function sendMessage() {
  if (isLoading) return;
  const input = document.getElementById('userInput');
  const query = input.value.trim();
  if (!query) return;
  input.value = '';
  isLoading = true;
  document.getElementById('sendBtn').disabled = true;

  const welcomeMsg = document.getElementById('welcomeMsg');
  if (welcomeMsg) welcomeMsg.style.display = 'none';

  const chatArea = document.getElementById('chatArea');
  chatArea.insertAdjacentHTML('beforeend', `
    <div class="message user">
      <div class="msg-avatar">жҲ?/div>
      <div class="msg-content">${escapeHtml(query)}</div>
    </div>
  `);

  const loadingId = 'loading_' + Date.now();
  chatArea.insertAdjacentHTML('beforeend', `
    <div class="message assistant" id="${loadingId}">
      <div class="msg-avatar">йӣ?/div>
      <div class="msg-content"><div class="loading-dots"><span></span><span></span><span></span></div></div>
    </div>
  `);
  scrollToBottom();

  try {
    const resp = await fetch(`${API_BASE}/api/search`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ query })
    });
    const result = await resp.json();
    document.getElementById(loadingId).remove();

    if (result.success && result.data.length > 0) {
      let html = `<div class="message assistant"><div class="msg-avatar">йӣ?/div><div class="msg-content">`;
      html += `жүҫеҲ° <b>${result.data.length}</b> жқЎзӣёе…іиө„жәҗпјҲе…?${result.total || result.data.length} жқЎеҢ№й…Қпјүпј?br>`;
      result.data.forEach(r => {
        html += renderResourceCard(r);
      });
      html += `</div></div>`;
      chatArea.insertAdjacentHTML('beforeend', html);
    } else {
      chatArea.insertAdjacentHTML('beforeend', `
        <div class="message assistant">
          <div class="msg-avatar">йӣ?/div>
          <div class="msg-content">${result.message || 'жңӘжүҫеҲ°еҢ№й…Қзҡ„иө„жәҗпјҢиҜ·е°қиҜ•жҚўдёӘж–№ејҸжҸҗй—®гҖ?}</div>
        </div>
      `);
    }
  } catch (e) {
    document.getElementById(loadingId)?.remove();
    chatArea.insertAdjacentHTML('beforeend', `
      <div class="message assistant">
        <div class="msg-avatar">йӣ?/div>
        <div class="msg-content">жҠұжӯүпјҢиҝһжҺҘжңҚеҠЎеҷЁеӨұиҙҘпјҢиҜ·зЎ®и®ӨеҗҺз«ҜжңҚеҠЎе·ІеҗҜеҠЁгҖ?br><small style="color:rgba(255,255,255,0.4)">${escapeHtml(e.message)}</small></div>
      </div>
    `);
  }
  isLoading = false;
  document.getElementById('sendBtn').disabled = false;
  scrollToBottom();
}

function renderResourceCard(r) {
  const typeIcon = { image: 'рҹ–ј', video: 'рҹҺ¬', audio: 'рҹҺө', document: 'рҹ“„', archive: 'рҹ“Ұ', link: 'рҹ”—', other: 'рҹ“Ғ' };
  const icon = typeIcon[r.file_type] || 'рҹ“Ғ';
  let html = `<div class="resource-card">`;
  html += `<div class="rc-title">${icon} ${escapeHtml(r.title)}</div>`;
  if (r.description) html += `<div class="rc-desc">${escapeHtml(r.description)}</div>`;
  if (r.tags) {
    html += `<div class="rc-tags">`;
    r.tags.split(/[,пјҢ\s]+/).filter(Boolean).forEach(t => {
      html += `<span class="rc-tag">${escapeHtml(t)}</span>`;
    });
    html += `</div>`;
  }
  html += `<div class="rc-meta" style="margin-bottom:4px">зұ»еһӢ: ${r.file_type}${r.file_size ? ' В· ' + formatSize(r.file_size) : ''} В· ${r.created_at || ''}</div>`;
  if (r.resource_type === 'file') {
    const fileUrl = `${API_BASE}${r.url}`;
    if (r.file_type === 'image') {
      html += `<img src="${fileUrl}" alt="${escapeHtml(r.title)}" loading="lazy" onerror="this.style.display='none'">`;
    } else if (r.file_type === 'video') {
      html += `<video controls preload="metadata" style="max-width:100%;max-height:300px;border-radius:8px;margin:8px 0"><source src="${fileUrl}" type="video/${r.file_ext}">жӮЁзҡ„жөҸи§ҲеҷЁдёҚж”ҜжҢҒи§Ҷйў‘ж’ӯж”ҫ</video>`;
    } else if (r.file_type === 'audio') {
      html += `<audio controls preload="metadata" style="width:100%;margin:8px 0"><source src="${fileUrl}">жӮЁзҡ„жөҸи§ҲеҷЁдёҚж”ҜжҢҒйҹійў‘ж’ӯж”ҫ</audio>`;
    }
    html += `<a class="rc-link" href="${fileUrl}" target="_blank" download>рҹ“Ҙ дёӢиҪҪж–Үд»¶</a>`;
    if (r.file_type === 'document' && (r.file_ext === 'pdf' || r.file_ext === 'txt')) {
      html += ` <a class="rc-link" href="${fileUrl}" target="_blank" style="background:rgba(255,255,255,0.1)">рҹ‘Ғ еңЁзәҝйў„и§Ҳ</a>`;
    }
  } else if (r.resource_type === 'link') {
    html += `<a class="rc-link" href="${escapeHtml(r.url)}" target="_blank">рҹ”— жү“ејҖй“ҫжҺҘ</a>`;
  }
  html += `</div>`;
  return html;
}

function formatSize(bytes) {
  if (!bytes) return '0B';
  const units = ['B','KB','MB','GB'];
  let i = 0;
  while (bytes >= 1024 && i < 3) { bytes /= 1024; i++; }
  return bytes.toFixed(2) + ' ' + units[i];
}

function scrollToBottom() {
  const area = document.getElementById('chatArea');
  setTimeout(() => { area.scrollTop = area.scrollHeight; }, 100);
}

function escapeHtml(text) {
  const d = document.createElement('div');
  d.textContent = text;
  return d.innerHTML;
}
</script>
</body>
</html>
