<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>小雷没摸鱼agent - AI资源助手</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
  background: linear-gradient(135deg, #0f0c29, #302b63, #24243e);
  height: 100vh; display: flex; flex-direction: column; overflow: hidden;
}
.chat-container {
  display: flex; flex-direction: column; height: 100vh; max-width: 900px; margin: 0 auto; width: 100%;
}
.chat-header {
  padding: 20px 24px; text-align: center;
  background: rgba(255,255,255,0.03); border-bottom: 1px solid rgba(255,255,255,0.06);
  flex-shrink: 0;
}
.chat-header h1 {
  font-size: 24px; font-weight: 700;
  background: linear-gradient(90deg, #a5b4fc, #c4b5fd, #e9d5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.chat-header .tagline { font-size: 12px; color: rgba(255,255,255,0.4); margin-top: 4px; }
.chat-messages {
  flex: 1; overflow-y: auto; padding: 24px;
  scroll-behavior: smooth;
}
.chat-messages::-webkit-scrollbar { width: 6px; }
.chat-messages::-webkit-scrollbar-track { background: transparent; }
.chat-messages::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
.welcome-area { text-align: center; padding: 60px 20px; }
.welcome-icon { font-size: 64px; margin-bottom: 16px; }
.welcome-area h2 {
  font-size: 22px; color: #e2e8f0; margin-bottom: 8px;
  background: linear-gradient(90deg, #c4b5fd, #e9d5ff);
  -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  background-clip: text;
}
.welcome-area p { color: rgba(255,255,255,0.5); font-size: 14px; line-height: 1.8; }
.quick-tags { display: flex; flex-wrap: wrap; gap: 8px; justify-content: center; margin-top: 20px; }
.quick-tag {
  padding: 8px 16px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.15);
  background: rgba(255,255,255,0.05); color: rgba(255,255,255,0.7);
  font-size: 13px; cursor: pointer; transition: all 0.3s;
}
.quick-tag:hover { background: rgba(99,102,241,0.2); border-color: rgba(99,102,241,0.4); color: #c4b5fd; }

.message { display: flex; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
@keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
.message.user { justify-content: flex-end; }
.message.assistant { justify-content: flex-start; }
.message-bubble {
  max-width: 80%; padding: 12px 18px; border-radius: 18px; font-size: 14px; line-height: 1.6;
  word-break: break-word;
}
.message.user .message-bubble {
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  border-bottom-right-radius: 4px;
}
.message.assistant .message-bubble {
  background: rgba(255,255,255,0.06); color: #e2e8f0;
  border: 1px solid rgba(255,255,255,0.08);
  border-bottom-left-radius: 4px;
}
.message-avatar {
  width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center;
  font-size: 18px; flex-shrink: 0; margin: 0 10px;
}
.message.user .message-avatar { background: rgba(99,102,241,0.2); }
.message.assistant .message-avatar { background: rgba(139,92,246,0.2); }
.resource-card {
  margin-top: 10px; border-radius: 12px; overflow: hidden;
  border: 1px solid rgba(255,255,255,0.1); background: rgba(255,255,255,0.04);
}
.resource-card img { width: 100%; max-width: 400px; display: block; }
.resource-card video { width: 100%; max-width: 400px; display: block; }
.resource-card audio { width: 100%; padding: 8px; }
.resource-card .file-download {
  display: flex; align-items: center; gap: 12px; padding: 16px;
  text-decoration: none; color: #e2e8f0; transition: background 0.3s;
}
.resource-card .file-download:hover { background: rgba(255,255,255,0.06); }
.resource-card .file-icon { font-size: 32px; }
.resource-card .file-info .file-name { font-size: 14px; font-weight: 500; }
.resource-card .file-info .file-meta { font-size: 11px; color: rgba(255,255,255,0.4); margin-top: 2px; }
.resource-card .external-link {
  display: flex; align-items: center; gap: 8px; padding: 14px 16px;
  color: #a5b4fc; text-decoration: none; font-size: 14px;
}
.resource-card .external-link:hover { background: rgba(255,255,255,0.06); }
.resource-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 6px; }
.resource-tag {
  font-size: 10px; padding: 2px 8px; border-radius: 10px;
  background: rgba(139,92,246,0.2); color: #a78bfa;
}
.loading-dots { display: flex; gap: 4px; padding: 4px 0; }
.loading-dots span {
  width: 6px; height: 6px; border-radius: 50%; background: rgba(255,255,255,0.3);
  animation: bounce 1.4s infinite ease-in-out both;
}
.loading-dots span:nth-child(1) { animation-delay: -0.32s; }
.loading-dots span:nth-child(2) { animation-delay: -0.16s; }
@keyframes bounce { 0%,80%,100% { transform: scale(0); } 40% { transform: scale(1); } }

.chat-input-area {
  padding: 16px 24px 24px; flex-shrink: 0;
  background: rgba(255,255,255,0.02); border-top: 1px solid rgba(255,255,255,0.06);
}
.input-wrapper {
  display: flex; gap: 12px; background: rgba(255,255,255,0.06);
  border: 1px solid rgba(255,255,255,0.1); border-radius: 20px; padding: 6px 6px 6px 18px;
  transition: border-color 0.3s;
}
.input-wrapper:focus-within { border-color: rgba(99,102,241,0.5); }
.input-wrapper input {
  flex: 1; background: transparent; border: none; outline: none; color: #fff; font-size: 14px;
}
.input-wrapper input::placeholder { color: rgba(255,255,255,0.35); }
.send-btn {
  width: 40px; height: 40px; border-radius: 50%; border: none;
  background: linear-gradient(135deg, #6366f1, #8b5cf6); color: #fff;
  font-size: 18px; cursor: pointer; flex-shrink: 0; transition: all 0.3s;
  display: flex; align-items: center; justify-content: center;
}
.send-btn:hover { transform: scale(1.05); box-shadow: 0 4px 15px rgba(99,102,241,0.3); }
.send-btn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
.footer-hint { text-align: center; font-size: 10px; color: rgba(255,255,255,0.2); margin-top: 8px; }

@media (max-width: 768px) {
  .chat-messages { padding: 16px; }
  .chat-input-area { padding: 12px 16px 16px; }
  .chat-header { padding: 16px; }
  .chat-header h1 { font-size: 20px; }
}
</style>
</head>
<body>

<div class="chat-container">
  <div class="chat-header">
    <h1>小雷没摸鱼agent</h1>
    <p class="tagline">AI资源助手</p>
  </div>

  <div class="chat-messages" id="chatMessages">
    <div class="welcome-area" id="welcomeArea">
      <div class="welcome-icon">&#x1F916;</div>
      <h2>你好，我是小雷没摸鱼agent</h2>
      <p>
        你可以向我提问，我会从资源知识库中为你匹配最相关的资料。<br>
        支持查找文档、视频、图片、音频等各种资源。
      </p>
      <div class="quick-tags">
        <span class="quick-tag" onclick="sendQuick('学习资料')">学习资料</span>
        <span class="quick-tag" onclick="sendQuick('视频教程')">视频教程</span>
        <span class="quick-tag" onclick="sendQuick('PPT模板')">PPT模板</span>
        <span class="quick-tag" onclick="sendQuick('文档资料')">文档资料</span>
      </div>
    </div>
  </div>

  <div class="chat-input-area">
    <div class="input-wrapper">
      <input type="text" id="userInput" placeholder="输入你的问题，例如：帮我找一个logo..."
        onkeydown="if(event.key==='Enter') sendMessage()">
      <button class="send-btn" id="sendBtn" onclick="sendMessage()">&#x27A4;</button>
    </div>
    <p class="footer-hint">小雷没摸鱼agent - 从你的资源库中智能匹配</p>
  </div>
</div>

<script>
var API_BASE = 'https://stories-discrete-hampton-trading.trycloudflare.com';

function sendQuick(text) {
  document.getElementById('userInput').value = text;
  sendMessage();
}

function sendMessage() {
  var input = document.getElementById('userInput');
  var text = input.value.trim();
  if (!text) return;

  var welcomeArea = document.getElementById('welcomeArea');
  if (welcomeArea) welcomeArea.remove();

  addMessage('user', text);
  input.value = '';

  var loadingMsg = addMessage('assistant', '', true);
  var btn = document.getElementById('sendBtn');
  btn.disabled = true;

  fetch(API_BASE + '/api/search', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({ query: text })
  }).then(function(r) { return r.json(); }).then(function(data) {
    loadingMsg.remove();
    if (data.success && data.data && data.data.length > 0) {
      showSearchResults(data.data, text);
    } else {
      addMessage('assistant', data.message || '未找到匹配的资源，请尝试换个方式提问。如果资源库为空，请联系管理员添加资源。');
    }
  }).catch(function(e) {
    loadingMsg.remove();
    addMessage('assistant', '搜索服务暂时不可用，请稍后重试。\n错误信息: ' + e.message);
  }).finally(function() {
    btn.disabled = false;
    scrollToBottom();
  });
}

function showSearchResults(results, query) {
  var msgDiv = document.createElement('div');
  msgDiv.className = 'message assistant';
  msgDiv.innerHTML =
    '<div class="message-avatar">&#x1F50D;</div>' +
    '<div class="message-bubble">' +
    '<div>为你找到 ' + results.length + ' 个相关资源：</div>' +
    results.map(function(r) { return renderResourceCard(r); }).join('') +
    '</div>';
  document.getElementById('chatMessages').appendChild(msgDiv);
  scrollToBottom();
}

function renderResourceCard(r) {
  var html = '<div class="resource-card">';
  var apiBase = API_BASE;

  if (r.resource_type === 'link') {
    html += '<a class="external-link" href="' + escapeAttr(r.url) + '" target="_blank">' +
      '<span>&#x1F517;</span>' +
      '<div><div>' + escapeHtml(r.title) + '</div>' +
      '<div style="font-size:11px;color:rgba(255,255,255,0.4)">' + escapeHtml(r.description || '') + '</div></div>' +
      '</a>';
  } else if (r.file_type === 'image') {
    html += '<img src="' + apiBase + r.url + '" alt="' + escapeAttr(r.title) + '" loading="lazy">';
  } else if (r.file_type === 'video') {
    html += '<video controls preload="metadata"><source src="' + apiBase + r.url + '" type="video/' + r.file_ext + '"></video>';
  } else if (r.file_type === 'audio') {
    html += '<audio controls><source src="' + apiBase + r.url + '" type="audio/' + r.file_ext + '"></audio>';
  } else {
    var iconMap = { document: '&#x1F4C4;', archive: '&#x1F4E6;', other: '&#x1F4C1;' };
    var icon = iconMap[r.file_type] || '&#x1F4C1;';
    html += '<a class="file-download" href="' + apiBase + r.url + '" download="' + escapeAttr(r.original_name || r.filename) + '">' +
      '<span class="file-icon">' + icon + '</span>' +
      '<div class="file-info">' +
      '<div class="file-name">' + escapeHtml(r.title) + '</div>' +
      '<div class="file-meta">' + (r.file_ext || '') + ' - 点击下载</div>' +
      '</div></a>';
  }

  if (r.tags) {
    html += '<div class="resource-tags">';
    r.tags.split(',').forEach(function(t) {
      t = t.trim();
      if (t) html += '<span class="resource-tag">' + escapeHtml(t) + '</span>';
    });
    html += '</div>';
  }
  html += '</div>';
  return html;
}

function addMessage(type, text, isLoading) {
  var msgDiv = document.createElement('div');
  msgDiv.className = 'message ' + type;
  var avatarIcon = type === 'user' ? '&#x1F464;' : '&#x1F916;';
  var bubbleContent = '';
  if (isLoading) {
    bubbleContent = '<div class="loading-dots"><span></span><span></span><span></span></div>';
  } else {
    bubbleContent = text.replace(/\n/g, '<br>');
  }
  msgDiv.innerHTML =
    '<div class="message-avatar">' + avatarIcon + '</div>' +
    '<div class="message-bubble">' + bubbleContent + '</div>';
  document.getElementById('chatMessages').appendChild(msgDiv);
  scrollToBottom();
  return msgDiv;
}

function scrollToBottom() {
  var container = document.getElementById('chatMessages');
  setTimeout(function() { container.scrollTop = container.scrollHeight; }, 100);
}

function escapeHtml(text) {
  var d = document.createElement('div');
  d.textContent = text || '';
  return d.innerHTML;
}

function escapeAttr(text) {
  return (text || '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}
</script>
</body>
</html>
